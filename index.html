<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>System Love v2.0</title>
<style>
    body {
        background: black;
        color: #00ff9f;
        font-family: monospace;
        text-align: center;
        padding-top: 50px;
        overflow: hidden;
    }
    .hidden { display: none; }

    button {
        background: #00ff9f;
        border: none;
        padding: 12px 20px;
        font-size: 16px;
        cursor: pointer;
        margin: 10px;
        border-radius: 8px;
    }

    #noBtn {
        position: absolute;
    }
</style>
</head>
<body>

<h2 id="text"></h2>

<div id="final" class="hidden">
    <h1>💚 Invitación detectada 💚</h1>
    <p>¿Aceptas salir a cenar conmigo este domingo para celebrar nuestro primer mes de casados? 💍</p>
    
    <button onclick="aceptar()">Sí ❤️</button>
    <button id="noBtn">No 😢</button>
</div>

<script>
let mensajes = [
    "Iniciando sistema...",
    "Cargando recuerdos...",
    "5 meses de novios detectados...",
    "1 mes de matrimonio confirmado...",
    "Nivel de amor: INFINITO ❤️",
    "Acceso concedido a: Mi esposa 💕"
];

let i = 0;

function escribir() {
    if (i < mensajes.length) {
        document.getElementById("text").innerHTML = mensajes[i];
        i++;
        setTimeout(escribir, 1500);
    } else {
        document.getElementById("text").classList.add("hidden");
        document.getElementById("final").classList.remove("hidden");
        moverBoton(); // posición inicial
    }
}

function aceptar() {
    alert("Sabía que dirías que sí 😏 Te veo el domingo ❤️");
}

// 🔥 FUNCIÓN PARA MOVER EL BOTÓN
function moverBoton() {
    let btn = document.getElementById("noBtn");

    let x = Math.random() * (window.innerWidth - btn.offsetWidth);
    let y = Math.random() * (window.innerHeight - btn.offsetHeight);

    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

// Para PC (hover)
document.addEventListener("mousemove", function(e) {
    let btn = document.getElementById("noBtn");
    let rect = btn.getBoundingClientRect();

    if (
        e.clientX > rect.left - 50 &&
        e.clientX < rect.right + 50 &&
        e.clientY > rect.top - 50 &&
        e.clientY < rect.bottom + 50
    ) {
        moverBoton();
    }
});

// Para iPhone (touch)
document.addEventListener("touchstart", function() {
    moverBoton();
});

escribir();
</script>

</body>
</html>
