<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensaje</title>

<style>
body {
    margin: 0;
    background: #f4ede4;
    color: #4b3832;
    font-family: "Courier New", monospace;
    text-align: center;
    overflow: hidden;
}

/* Lock screen */
#lockscreen {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.notification {
    background: #fff8f0;
    padding: 20px;
    border-radius: 20px;
    width: 80%;
    max-width: 320px;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Sistema */
#system {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
}

.system-box {
    background: #2e2a27;
    color: #fce8d5;
    padding: 20px;
    border-radius: 15px;
    width: 80%;
    max-width: 400px;
    text-align: left;
}

.system-header {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
}

.dot { width:10px; height:10px; border-radius:50%; }
.red { background:#ff6b6b; }
.yellow { background:#ffd93d; }
.green { background:#6bcf63; }

/* Carta */
#letter {
    display: none;
    padding: 30px;
    height: 100vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
}

#cartaTexto {
    white-space: pre-line;
    font-size: 18px;
    line-height: 1.6;
    padding-bottom: 100px;
}

/* aviso scroll */
#scrollMsg {
    position: fixed;
    bottom: 20px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    opacity: 0.7;
}

/* Final */
#final {
    display: none;
    margin-top: 80px;
}

/* botones */
button {
    background: #d8a47f;
    border: none;
    padding: 12px 20px;
    margin: 10px;
    border-radius: 10px;
    font-size: 16px;
    color: white;
}

/* corazones */
.heart {
    position: fixed;
    color: #d98c8c;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<audio id="music" loop>
    <source src="mai.mp3" type="audio/mpeg">
</audio>

<!-- Notificación -->
<div id="lockscreen">
    <div class="notification" onclick="abrir()">
        <h3>💌 Nuevo mensaje</h3>
        <p>De: Tu esposo</p>
    </div>
</div>

<!-- Sistema -->
<div id="system">
    <div class="system-box">
        <div class="system-header">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div id="text"></div>
    </div>
</div>

<!-- Carta -->
<div id="letter">
    <h2>Para ti ❤️</h2>
    <p id="cartaTexto"></p>
    <div id="scrollMsg">Desliza hasta el final 💌</div>
</div>

<!-- Final -->
<div id="final">
    <h1>💖 Invitación especial 💖</h1>
    <p>¿Aceptas salir a cenar conmigo este domingo?</p>

    <button onclick="aceptar()">Sí ❤️</button>
    <button id="noBtn">No 😢</button>
</div>

<script>

// CARTA
let carta = `Hola preciosa, ¿como se encuentra la mami mas bonita de todo el mundo?

Te escribo esta cartita de manera rapida mi amor, solo que sepas que te amo con todo mi corazon,
eres lo mas bonito y preciado que tengo, gracias por este increible mes siendo esposos,
por darme de tu tiempo y sobre todo dedicarme de tu tiempo, nunca en la vida me hubiese imaginado
que estaria con una persona con una calidad humana tan preciosa como la tuya mi vida.
Que nunca nunca se te olvide que eres lo mas bonito que me paso , que el echo de que formaremos una
familia nosotros dos es algo que me llena de emocion y me da motivos para vivir cada dia.

Por siempre y para siempre juntitos vida hermosa.
Me encantas. ❤️

Desde que estás conmigo… todo se siente diferente.

Cada momento contigo se vuelve especial...`;

let indexCarta = 0;

let mensajes = [
    "Iniciando sistema...",
    "Cargando recuerdos...",
    "5 meses de novios detectados (casi jeje)...",
    "1 mes de matrimonio confirmado...",
    "Nivel de amor: DEMASIADO",
    "Acceso concedido a: Mi esposa"
];

let i = 0;
let puedeContinuar = false;

// abrir
function abrir() {
    document.getElementById("lockscreen").style.display = "none";
    document.getElementById("system").style.display = "flex";
    document.getElementById("music").play();
    escribirSistema();
}

// sistema
function escribirSistema() {
    if (i < mensajes.length) {
        document.getElementById("text").innerHTML += mensajes[i] + "<br>";
        i++;
        setTimeout(escribirSistema, 1200);
    } else {
        setTimeout(() => {
            document.getElementById("system").style.display = "none";
            document.getElementById("letter").style.display = "block";
            escribirCarta();
        }, 800);
    }
}

// carta typing
function escribirCarta() {
    if (indexCarta < carta.length) {
        document.getElementById("cartaTexto").innerHTML += carta.charAt(indexCarta);
        indexCarta++;
        setTimeout(escribirCarta, 25);
    }
}

// detectar scroll final
let letter = document.getElementById("letter");

letter.addEventListener("scroll", function() {
    if (letter.scrollTop + letter.clientHeight >= letter.scrollHeight - 10) {
        puedeContinuar = true;
        document.getElementById("scrollMsg").innerHTML = "Toca la pantalla ❤️";
    }
});

// pasar a final SOLO si leyó todo
letter.addEventListener("click", function() {
    if (puedeContinuar) {
        document.getElementById("letter").style.display = "none";
        document.getElementById("final").style.display = "block";
    }
});

// aceptar
function aceptar() {
    alert("Sabía que dirías que sí ❤️ Te veo el domingo");
}

// botón troll
let noBtn = document.getElementById("noBtn");

function moverBoton() {
    noBtn.style.position = "absolute";
    noBtn.style.left = Math.random() * (window.innerWidth - 100) + "px";
    noBtn.style.top = Math.random() * (window.innerHeight - 50) + "px";
}

noBtn.addEventListener("touchstart", function(e) {
    e.preventDefault();
    moverBoton();
});

noBtn.addEventListener("mouseover", moverBoton);

// corazones
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
}, 400);

</script>

</body>
</html>
