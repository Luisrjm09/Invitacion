<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Love v3.0</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff9f;
    font-family: monospace;
    text-align: center;
    overflow: hidden;
}

/* Texto inicial */
#text {
    margin-top: 80px;
    font-size: 20px;
}

/* Contenedor final */
#final {
    display: none;
    margin-top: 80px;
}

/* Botones */
button {
    background: #00ff9f;
    border: none;
    padding: 12px 20px;
    font-size: 16px;
    cursor: pointer;
    margin: 10px;
    border-radius: 10px;
}

/* Corazones */
.heart {
    position: fixed;
    color: red;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>

</head>
<body>

<h2 id="text"></h2>

<div id="final">
    <h1>💚 Invitación detectada 💚</h1>
    <p>¿Aceptas salir a cenar conmigo este domingo para celebrar nuestro primer mes de casados? 💍</p>
    
    <button onclick="aceptar()">Sí ❤️</button>
    <button id="noBtn">No 😢</button>
</div>

<script>
let mensajes = [
    "Iniciando sistema...",
    "Cargando recuerdos...",
    "5 meses de novios detectados...",
    "1 mes de matrimonio confirmado...",
    "Nivel de amor: INFINITO ❤️",
    "Acceso concedido a: Mi esposa 💕"
];

let i = 0;

// Intro tipo sistema
function escribir() {
    if (i < mensajes.length) {
        document.getElementById("text").innerHTML = mensajes[i];
        i++;
        setTimeout(escribir, 1500);
    } else {
        document.getElementById("text").style.display = "none";
        document.getElementById("final").style.display = "block";
    }
}

// Botón Sí
function aceptar() {
    alert("Sabía que dirías que sí 😏❤️ Te veo el domingo 💍");
}

// Botón No que huye
function moverBoton() {
    let btn = document.getElementById("noBtn");

    btn.style.position = "absolute";

    let x = Math.random() * (window.innerWidth - btn.offsetWidth);
    let y = Math.random() * (window.innerHeight - btn.offsetHeight);

    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

// Eventos (iPhone + PC)
let noBtn = document.getElementById("noBtn");

noBtn.addEventListener("touchstart", function(e) {
    e.preventDefault();
    moverBoton();
});

noBtn.addEventListener("mouseover", function() {
    moverBoton();
});

// Corazones animados
function crearCorazon() {
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(crearCorazon, 300);

// Iniciar animación
escribir();
</script>

</body>
</html>
