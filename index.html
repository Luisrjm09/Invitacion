<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensaje</title>

<style>
body {
    margin: 0;
    background: #f4ede4;
    color: #4b3832;
    font-family: "Courier New", monospace;
    text-align: center;
    overflow: hidden;
}

/* Lock screen */
#lockscreen {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.notification {
    background: #fff8f0;
    padding: 20px;
    border-radius: 20px;
    width: 80%;
    max-width: 320px;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

/* Sistema estilo ventanita */
#system {
    display: none;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.system-box {
    background: #2e2a27;
    color: #fce8d5;
    padding: 20px;
    border-radius: 15px;
    width: 80%;
    max-width: 400px;
    text-align: left;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.system-header {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
}

.dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
}

.red { background: #ff6b6b; }
.yellow { background: #ffd93d; }
.green { background: #6bcf63; }

#text {
    font-size: 14px;
}

/* Carta */
#letter {
    display: none;
    padding: 30px;
}

#cartaTexto {
    white-space: pre-line;
    font-size: 18px;
    line-height: 1.6;
}

/* Final */
#final {
    display: none;
    margin-top: 80px;
}

/* botones */
button {
    background: #d8a47f;
    border: none;
    padding: 12px 20px;
    margin: 10px;
    border-radius: 10px;
    font-size: 16px;
    color: white;
}

/* corazones */
.heart {
    position: fixed;
    color: #d98c8c;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); }
}

/* mensajes ocultos */
.msg {
    position: fixed;
    color: #c97b63;
    animation: fade 2s forwards;
}

@keyframes fade {
    0% { opacity: 1; }
    100% { opacity: 0; }
}
</style>
</head>

<body>

<audio id="music" loop>
    <source src="mai.mp3" type="audio/mpeg">
</audio>

<!-- Notificación -->
<div id="lockscreen">
    <div class="notification" onclick="abrir()">
        <h3>💌 Nuevo mensaje</h3>
        <p>De: Tu esposo</p>
    </div>
</div>

<!-- Sistema -->
<div id="system">
    <div class="system-box">
        <div class="system-header">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
        </div>
        <div id="text"></div>
    </div>
</div>

<!-- Carta -->
<div id="letter" onclick="mostrarFinal()">
    <h2>Para ti ❤️</h2>
    <p id="cartaTexto"></p>
</div>

<!-- Final -->
<div id="final">
    <h1>💖 Invitación especial 💖</h1>
    <p>¿Aceptas salir a cenar conmigo este domingo?</p>

    <button onclick="aceptar()">Sí ❤️</button>
    <button id="noBtn">No 😢</button>
</div>

<script>

let carta = `Hola preciosa, ¿como se encuentra la mami mas bonita de todo el mundo?

Te escribo esta cartita de manera rapida mi amor, solo que sepas que te amo con todo mi corazon,
eres lo mas bonito y preciado que tengo, gracias por este increible mes siendo esposos,
por darme de tu tiempo y sobre todo dedicarme de tu tiempo, nunca en la vida me hubiese imaginado
que estaria con una persona con una calidad humana tan preciosa como la tuya mi vida.
Que nunca nunca se te olvide que eres lo mas bonito que me paso , que el echo de que formaremos una
familia nosotros dos es algo que me llena de emocion y me da motivos para vivir cada dia.

Por siempre y para siempre juntitos vida hermosa.
Me encantas. ❤️

Desde que estás conmigo… todo se siente diferente.

Cada momento contigo se vuelve especial...

(toca la pantalla)`;

let indexCarta = 0;

let mensajes = [
    "Iniciando sistema...",
    "Cargando recuerdos...",
    "5 meses de novios detectados (casi jeje)...",
    "1 mes de matrimonio confirmado...",
    "Nivel de amor: DEMASIADO",
    "Acceso concedido a: Mi esposa"
];

let i = 0;

function abrir() {
    document.getElementById("lockscreen").style.display = "none";
    document.getElementById("system").style.display = "flex";

    document.getElementById("music").play();

    escribirSistema();
}

function escribirSistema() {
    if (i < mensajes.length) {
        document.getElementById("text").innerHTML += mensajes[i] + "<br>";
        i++;
        setTimeout(escribirSistema, 1200);
    } else {
        setTimeout(() => {
            document.getElementById("system").style.display = "none";
            document.getElementById("letter").style.display = "block";
            escribirCarta();
        }, 800);
    }
}

function escribirCarta() {
    if (indexCarta < carta.length) {
        document.getElementById("cartaTexto").innerHTML += carta.charAt(indexCarta);
        indexCarta++;
        setTimeout(escribirCarta, 25);
    }
}

function mostrarFinal() {
    document.getElementById("letter").style.display = "none";
    document.getElementById("final").style.display = "block";
}

function aceptar() {
    alert("Sabía que dirías que sí ❤️ Te veo el domingo");
}

let noBtn = document.getElementById("noBtn");

function moverBoton() {
    noBtn.style.position = "absolute";

    let x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
    let y = Math.random() * (window.innerHeight - noBtn.offsetHeight);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("touchstart", function(e) {
    e.preventDefault();
    moverBoton();
});

noBtn.addEventListener("mouseover", moverBoton);

function crearCorazon() {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}
setInterval(crearCorazon, 400);

</script>

</body>
</html>
